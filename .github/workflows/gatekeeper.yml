name: Gatekeeper CI Quality Guard

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  gatekeeper-test:
    name: Deterministic Quality Verification
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the pull request code with full git history
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up a standard, isolated Python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Optional caching to speed up runs if you add a requirements.txt later

      # 3. Install core dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      # 4. Perform a compilation check across all workspace Python files to catch syntax errors
      - name: Verify Python Code Syntax
        run: |
          echo "Compiling all Python files in the workspace..."
          find . -name "*.py" -not -path "*/.*" -not -path "*/node_modules/*" -not -path "*/venv/*" -not -path "*/dist/*" -not -path "*/build/*" -exec python3 -m py_compile {} +

      # 5. Validate TASKLIST.md structure if both the file and verify_xml.py exist [ci_reviewer.py]
      - name: Verify TASKLIST.md Schema
        run: |
          if [ -f "TASKLIST.md" ] && [ -f "verify_xml.py" ]; then
            echo "TASKLIST.md and verification helper detected. Validating XML structure..."
            python3 verify_xml.py
          else
            echo "TASKLIST.md or verify_xml.py not found. Skipping schema verification."
          fi

      # 6. Locate, extract Task ID, and execute the targeted verification unit test
      - name: Run Targeted Unit Test
        run: |
          # Parse the source branch name (e.g. 'ocr-tasks-1' or 'ocr-tasks-42')
          BRANCH_NAME="${{ github.head_ref }}"
          echo "Target head branch: $BRANCH_NAME"
          
          # Extract numerical ID from the branch naming convention
          if [[ "$BRANCH_NAME" =~ ocr-tasks-([0-9]+) ]]; then
            TASK_ID="${BASH_REMATCH[1]}"
            REQUIRED_TEST_FILE="tests/test_task_${TASK_ID}.py"
            
            echo "Detected Agent Task Branch for ID: $TASK_ID"
            echo "Enforcing check for test file: $REQUIRED_TEST_FILE"
            
            # Ensure physical test file exists [ci_reviewer.py]
            if [ ! -f "$REQUIRED_TEST_FILE" ]; then
              echo "::error::Gatekeeper Tripped: Required test file '$REQUIRED_TEST_FILE' does not exist."
              exit 1
            fi
            
            # Run the specific unittest suite
            echo "Executing targeted verification suite: $REQUIRED_TEST_FILE"
            python3 -m unittest discover -s tests -p "test_task_${TASK_ID}.py"
            
          else
            echo "Branch name '$BRANCH_NAME' does not match the agent convention 'ocr-tasks-<ID>'."
            echo "Running all discovered tests as fallback..."
            python3 -m unittest discover -s tests
          fi

      # 7. Print a summary diagnostic block upon completion
      - name: Generate Job Summary
        if: always()
        run: |
          echo "### 🛡️ Gatekeeper CI Verification Report" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Source Branch: \`${{ github.head_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Target Branch: \`${{ github.base_ref }}\`" >> $GITHUB_STEP_SUMMARY
